<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error · TARS</title>
    <meta name="description" content="Internal server error.">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236366f1'/%3E%3Ctext y='.9em' font-size='80' text-anchor='middle' x='50' fill='white' font-family='system-ui' font-weight='bold'%3ET%3C/text%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --tars-bg: #0a0d14;
            --tars-surface: #111827;
            --tars-border: #1f2937;
            --tars-accent: #6366f1;
            --tars-accent-hover: #4f46e5;
            --tars-green: #10b981;
            --tars-text: #f9fafb;
            --tars-muted: #9ca3af;
        }

        body {
            background-color: var(--tars-bg);
            color: var(--tars-text);
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 2rem 1rem;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: "Space Grotesk", system-ui, sans-serif;
        }

        .btn-accent {
            background-color: var(--tars-accent);
            color: #fff;
            border: none;
            font-weight: 600;
            padding: 0.65rem 1.6rem;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }
        .btn-accent:hover {
            background-color: var(--tars-accent-hover);
            color: #fff;
        }

        .btn-outline-accent {
            border: 1.5px solid var(--tars-accent);
            color: var(--tars-accent);
            font-weight: 600;
            padding: 0.65rem 1.6rem;
            border-radius: 8px;
            background: transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        .btn-outline-accent:hover {
            background-color: var(--tars-accent);
            color: #fff;
        }

        .error-code {
            font-family: "Space Grotesk", system-ui, sans-serif;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ef4444 0%, rgba(239,68,68,0.3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            user-select: none;
        }

        .error-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(239,68,68,0.06) 0%, transparent 70%);
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .error-divider {
            width: 40px;
            height: 3px;
            background: #ef4444;
            border-radius: 2px;
            margin: 1.5rem auto;
            opacity: 0.5;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 1px); }
            94% { transform: translate(2px, -1px); }
            96% { transform: translate(-1px, 2px); }
            98% { transform: translate(1px, -2px); }
        }

        .error-icon-wrap {
            animation: glitch 4s ease-in-out infinite;
            display: inline-block;
        }

        .support-box {
            background: rgba(239,68,68,0.06);
            border: 1px solid rgba(239,68,68,0.15);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            display: inline-block;
            margin-top: 1rem;
        }

        .navbar-brand {
            font-family: "Space Grotesk", system-ui, sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.02em;
            color: var(--tars-text);
            text-decoration: none;
        }
        .navbar-brand span { color: var(--tars-accent); }
    </style>
</head>
<body>
<div style="position:relative; width:100%; max-width:560px;">
    <div class="error-glow"></div>
    <div class="text-center" style="position:relative; z-index:1;">
        <a class="navbar-brand d-inline-block mb-4" href="/">T<span>.</span>ARS</a>

        <div class="error-icon-wrap mb-3">
            <i class="bi bi-bug-fill" style="font-size:3.5rem; color:#ef4444; opacity:0.8;"></i>
        </div>
        <div class="error-code">500</div>
        <div class="error-divider"></div>
        <h1 class="h3 fw-bold mb-2" style="color:var(--tars-text);">
            TARS hit a bug. We're on it.
        </h1>
        <p class="mb-4" style="color:var(--tars-muted); max-width:400px; margin:0 auto 1.5rem;">
            Something went wrong on our end. The autonomous agent has been notified and is already debugging this.
        </p>

        <div class="support-box mb-4">
            <p class="mb-1" style="font-size:0.82rem; color:var(--tars-muted);">
                Need urgent help? Reach us at
            </p>
            <a href="mailto:support@tars.dev" style="color:#f87171; font-weight:600; font-size:0.9rem; text-decoration:none;">
                <i class="bi bi-envelope me-1"></i>support@tars.dev
            </a>
        </div>

        <div class="d-flex flex-wrap gap-3 justify-content-center">
            <a href="/" class="btn-accent">
                <i class="bi bi-house"></i>Back to Home
            </a>
            <a href="javascript:location.reload()" class="btn-outline-accent">
                <i class="bi bi-arrow-clockwise"></i>Try Again
            </a>
        </div>
        <p class="mt-5" style="font-size:0.78rem; color:rgba(156,163,175,0.4);">
            Error code: 500 · Internal Server Error
        </p>
    </div>
</div>
</body>
</html>
