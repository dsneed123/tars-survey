<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block subject %}TARS{% endblock %}</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0a0d14;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #d1d5db;
      -webkit-font-smoothing: antialiased;
    }
    .email-wrapper {
      background-color: #0a0d14;
      padding: 40px 16px;
    }
    .email-container {
      max-width: 580px;
      margin: 0 auto;
      background-color: #111827;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #1f2937;
    }
    /* Header */
    .email-header {
      background: linear-gradient(135deg, #0a0d14 0%, #111827 50%, #1a1033 100%);
      border-bottom: 1px solid #1f2937;
      padding: 32px 40px;
      text-align: center;
    }
    .email-logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #f9fafb;
      text-decoration: none;
    }
    .email-logo span {
      color: #6366f1;
    }
    .email-logo-badge {
      display: inline-block;
      width: 48px;
      height: 48px;
      background-color: #6366f1;
      border-radius: 12px;
      line-height: 48px;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 12px;
    }
    /* Body */
    .email-body {
      padding: 40px 40px 32px;
    }
    .email-greeting {
      font-size: 22px;
      font-weight: 700;
      color: #f9fafb;
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .email-text {
      color: #9ca3af;
      margin-bottom: 16px;
      font-size: 15px;
    }
    .email-text a {
      color: #6366f1;
      text-decoration: none;
    }
    .email-text a:hover {
      text-decoration: underline;
    }
    /* CTA Button */
    .email-cta {
      text-align: center;
      margin: 32px 0;
    }
    .btn-primary {
      display: inline-block;
      background-color: #6366f1;
      color: #fff !important;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    .btn-secondary {
      display: inline-block;
      border: 1.5px solid #6366f1;
      color: #6366f1 !important;
      font-weight: 600;
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.01em;
    }
    /* Info box */
    .info-box {
      background-color: #0a0d14;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 20px 24px;
      margin: 24px 0;
    }
    .info-box-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .info-box-value {
      color: #f9fafb;
      font-size: 15px;
      font-weight: 500;
    }
    /* Status badge */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .status-in-progress { background-color: rgba(99,102,241,0.15); color: #818cf8; }
    .status-reviewing   { background-color: rgba(16,185,129,0.15); color: #34d399; }
    .status-failed      { background-color: rgba(239,68,68,0.15);  color: #f87171; }
    .status-completed   { background-color: rgba(16,185,129,0.15); color: #34d399; }
    /* Divider */
    .email-divider {
      border: none;
      border-top: 1px solid #1f2937;
      margin: 28px 0;
    }
    /* Feature list */
    .feature-list {
      list-style: none;
      padding: 0;
      margin: 16px 0;
    }
    .feature-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
      color: #9ca3af;
      font-size: 14px;
    }
    .feature-list li .icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      background-color: rgba(99,102,241,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #6366f1;
      font-weight: 700;
      margin-top: 1px;
    }
    /* Stat row */
    .stat-row {
      display: table;
      width: 100%;
      margin: 20px 0;
    }
    .stat-cell {
      display: table-cell;
      text-align: center;
      padding: 16px 8px;
      background-color: #0a0d14;
      border: 1px solid #1f2937;
      border-radius: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: #f9fafb;
      display: block;
    }
    .stat-label {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    /* Task item */
    .task-item {
      background-color: #0a0d14;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 8px;
    }
    .task-item-title {
      color: #f9fafb;
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .task-item-meta {
      color: #6b7280;
      font-size: 12px;
    }
    .task-item-meta a {
      color: #6366f1;
      text-decoration: none;
    }
    /* Footer */
    .email-footer {
      background-color: #0a0d14;
      border-top: 1px solid #1f2937;
      padding: 24px 40px;
      text-align: center;
    }
    .email-footer p {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 6px;
    }
    .email-footer a {
      color: #6366f1;
      text-decoration: none;
      font-size: 12px;
    }
    /* Mobile */
    @media (max-width: 600px) {
      .email-body { padding: 28px 24px 24px; }
      .email-header { padding: 24px; }
      .email-footer { padding: 20px 24px; }
    }
  </style>
</head>
<body>
<div class="email-wrapper">
  <div class="email-container">

    <!-- Header -->
    <div class="email-header">
      <div class="email-logo-badge">T</div>
      <div class="email-logo">T<span>.</span>ARS</div>
    </div>

    <!-- Body -->
    <div class="email-body">
      {% block body %}{% endblock %}
    </div>

    <!-- Footer -->
    <div class="email-footer">
      <p>You're receiving this because you have a TARS account.</p>
      <p>
        <a href="{{ site_url }}/dashboard/settings/notifications/">Manage notification preferences</a>
        &nbsp;·&nbsp;
        <a href="{{ site_url }}/dashboard/">Go to dashboard</a>
      </p>
      <p style="margin-top:12px;">© 2026 TARS. All rights reserved.</p>
    </div>

  </div>
</div>
</body>
</html>
