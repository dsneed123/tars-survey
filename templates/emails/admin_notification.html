<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: Arial, sans-serif; color: #333; background: #f8f9fa; margin: 0; padding: 20px; }
    .card { background: #fff; border-radius: 6px; padding: 24px 32px; max-width: 600px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h1 { font-size: 1.4rem; color: #0d6efd; margin-top: 0; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th { text-align: left; width: 110px; color: #6c757d; font-weight: normal; padding: 6px 0; vertical-align: top; }
    td { padding: 6px 0; vertical-align: top; }
    .message-box { background: #f8f9fa; border-left: 4px solid #0d6efd; padding: 12px 16px; border-radius: 4px; white-space: pre-wrap; }
    .footer { font-size: 0.8rem; color: #adb5bd; margin-top: 24px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>New Inquiry Received</h1>
    <p>A new inquiry has been submitted via TARS Survey.</p>
    <table>
      <tr><th>Name</th><td>{{ inquiry.name }}</td></tr>
      <tr><th>Email</th><td><a href="mailto:{{ inquiry.email }}">{{ inquiry.email }}</a></td></tr>
      <tr><th>Subject</th><td>{{ inquiry.subject }}</td></tr>
      <tr><th>Submitted</th><td>{{ inquiry.submitted_at|date:"N j, Y, P" }}</td></tr>
    </table>
    <strong>Message:</strong>
    <div class="message-box">{{ inquiry.message }}</div>
    <p class="footer">TARS Survey &mdash; Admin Notification</p>
  </div>
</body>
</html>
