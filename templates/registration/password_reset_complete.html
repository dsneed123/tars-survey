{% extends "base.html" %}

{% block title %}Password Reset Complete — TARS{% endblock %}

{% block extra_head %}
<style>
    .auth-card {
        background-color: var(--tars-surface);
        border: 1px solid var(--tars-border);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        max-width: 420px;
        margin: 0 auto;
    }
    .auth-logo {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--tars-text);
        text-decoration: none;
        display: inline-block;
        margin-bottom: 1.5rem;
    }
    .auth-logo span { color: var(--tars-accent); }
    .icon-wrap {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(16,185,129,0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.25rem;
        font-size: 1.5rem;
        color: var(--tars-green);
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5 mt-3">
    <div class="auth-card text-center">
        <a class="auth-logo" href="{% url 'pages:landing' %}">T<span>.</span>ARS</a>
        <div class="icon-wrap"><i class="bi bi-check-circle"></i></div>
        <h1 class="h4 fw-bold mb-2" style="color:var(--tars-text)">Password updated</h1>
        <p class="small mb-4" style="color:var(--tars-muted)">
            Your password has been set. You can now sign in with your new password.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-accent w-100">Sign in</a>
    </div>
</div>
{% endblock %}
