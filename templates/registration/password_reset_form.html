{% extends "base.html" %}

{% block title %}Reset Password — TARS{% endblock %}

{% block extra_head %}
<style>
    .auth-card {
        background-color: var(--tars-surface);
        border: 1px solid var(--tars-border);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        max-width: 420px;
        margin: 0 auto;
    }
    .auth-logo {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--tars-text);
        text-decoration: none;
        display: inline-block;
        margin-bottom: 1.5rem;
    }
    .auth-logo span { color: var(--tars-accent); }
    .form-control {
        background-color: rgba(255,255,255,0.04);
        border: 1px solid var(--tars-border);
        color: var(--tars-text);
        border-radius: 8px;
    }
    .form-control:focus {
        background-color: rgba(255,255,255,0.06);
        border-color: var(--tars-accent);
        color: var(--tars-text);
        box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .form-label { color: var(--tars-muted); font-size: 0.85rem; font-weight: 500; }
</style>
{% endblock %}

{% block content %}
<div class="container py-5 mt-3">
    <div class="auth-card">
        <div class="text-center">
            <a class="auth-logo" href="{% url 'pages:landing' %}">T<span>.</span>ARS</a>
            <h1 class="h4 fw-bold mb-1" style="color:var(--tars-text)">Reset your password</h1>
            <p class="small mb-4" style="color:var(--tars-muted)">Enter your email and we'll send you a reset link</p>
        </div>
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-4">
                <label for="{{ form.email.id_for_label }}" class="form-label">Email address</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn btn-accent w-100">Send Reset Link</button>
        </form>
        <hr style="border-color:var(--tars-border)" class="my-4">
        <p class="text-center small mb-0" style="color:var(--tars-muted)">
            <a href="{% url 'accounts:login' %}" style="color:var(--tars-accent)">Back to sign in</a>
        </p>
    </div>
</div>
{% endblock %}
