[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = ["python -m pip install -r requirements.txt"]

[start]
cmd = "python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py create_superuser_if_none && gunicorn tars_site.wsgi --bind 0.0.0.0:${PORT:-8000} --log-file -"
