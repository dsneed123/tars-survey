{% extends "base.html" %}

{% block title %}Thank You — TARS{% endblock %}

{% block extra_head %}
<style>
    .thank-you-page {
        min-height: 80vh;
        display: flex;
        align-items: center;
        position: relative;
    }

    .thank-you-page::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 70% 50% at 50% -5%, rgba(16,185,129,0.15) 0%, transparent 55%);
        pointer-events: none;
        z-index: 0;
    }

    .thank-you-card {
        background: var(--tars-surface);
        border: 1px solid var(--tars-border);
        border-radius: 20px;
        padding: 3rem 2.5rem;
        text-align: center;
        position: relative;
        z-index: 1;
    }

    .check-icon {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(16,185,129,0.15);
        border: 2px solid rgba(16,185,129,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        margin: 0 auto 1.75rem;
        color: var(--tars-green);
    }
</style>
{% endblock %}

{% block content %}
<div class="thank-you-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="thank-you-card">
                    <div class="check-icon">
                        <i class="bi bi-check-lg"></i>
                    </div>
                    <h1 style="font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.75rem;">
                        We've received your inquiry!
                    </h1>
                    <p style="color: var(--tars-muted); font-size: 1.1rem; margin-bottom: 2rem;">
                        We'll be in touch within 24 hours.
                    </p>
                    <a href="{% url 'pages:landing' %}" class="btn btn-accent">
                        Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
